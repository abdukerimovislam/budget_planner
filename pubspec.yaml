name: budget_planner
description: Budget planner that thinks for you
publish_to: 'none'

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2
  provider: ^6.1.2
  go_router: ^14.8.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  fl_chart: ^1.1.1
  speech_to_text: ^7.3.0
  image_picker: ^1.2.1
  google_mlkit_text_recognition: ^0.15.1
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  cupertino: ^0.0.1
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_app_check: ^0.4.1+5
  firebase_vertexai: ^2.2.0
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env