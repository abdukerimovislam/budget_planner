name: budget_planner
description: Budget planner that thinks for you
publish_to: 'none'

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2
  provider: ^6.1.2
  go_router: ^14.8.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  fl_chart: ^1.1.1
  speech_to_text: ^7.3.0
  image_picker: ^1.2.1
  google_mlkit_text_recognition: ^0.15.1
  share_plus: ^12.0.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true